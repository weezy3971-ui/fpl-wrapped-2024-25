
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPL Wrapped</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #000;
        color: white;
        overflow-x: hidden;
      }
      .wrapped-gradient {
        background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      @keyframes border-beam {
        100% { offset-distance: 100%; }
      }

      .border-beam-container {
        position: relative;
        border-radius: 1rem;
        overflow: hidden;
      }

      .border-beam {
        position: absolute;
        inset: 0;
        border: 2px solid transparent;
        border-radius: 1rem;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        pointer-events: none;
      }

      .border-beam::after {
        content: "";
        position: absolute;
        aspect-ratio: 1;
        width: 100px;
        background: linear-gradient(to right, transparent, #00ff85, transparent);
        offset-path: rect(0 auto auto 0 round 1rem);
        animation: border-beam 3s infinite linear;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .float-animation {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(-150%) skewX(-20deg); }
        100% { transform: translateX(150%) skewX(-20deg); }
      }
      .shimmer-sweep {
        position: relative;
        overflow: hidden;
      }
      .shimmer-sweep::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        animation: shimmer 4s infinite;
      }

      @keyframes glow-pulse-green {
        0%, 100% { box-shadow: 0 0 20px -5px rgba(0, 255, 133, 0.3); }
        50% { box-shadow: 0 0 40px 5px rgba(0, 255, 133, 0.5); }
      }
      .animate-glow-green {
        animation: glow-pulse-green 4s ease-in-out infinite;
      }

      .grid-pattern {
        background-image: radial-gradient(#00ff85 0.5px, transparent 0.5px);
        background-size: 24px 24px;
        opacity: 0.05;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",

}
